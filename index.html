<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Doettinger Hoehe Ausschnitt</title>
  <style>
    :root {
      --source-w: 3920;
      --source-h: 2048;
      --focus-x: 1940;
      --focus-y: 910;
      --stage-height: 185dvh;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100%;
      height: 100%;
      min-height: 100vh;
      background: #111;
      color: #f4f4f4;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      overflow: hidden;
    }

    main {
      display: contents;
    }

    .crop {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100dvh;
      overflow: hidden;
      background: #222;
    }

    .crop img {
      position: absolute;
      width: auto;
      height: var(--stage-height);
      top: calc(50% - (var(--focus-y) / var(--source-h) * var(--stage-height)));
      max-width: none;
      user-select: none;
      -webkit-user-drag: none;
    }

    .crop img[data-col="2"] {
      left: calc(50% - (var(--focus-x) / var(--source-h) * var(--stage-height)));
    }

    .crop img[data-col="3"] {
      left: calc(50% + ((1960 - var(--focus-x)) / var(--source-h) * var(--stage-height)));
    }

    .bar {
      display: none !important;
      position: fixed;
      left: max(12px, env(safe-area-inset-left));
      right: max(12px, env(safe-area-inset-right));
      bottom: max(12px, env(safe-area-inset-bottom));
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      padding: 0;
      font-size: 14px;
      color: #cfcfcf;
      pointer-events: none;
    }

    button,
    a {
      color: #fff;
      background: rgba(45, 95, 58, 0.92);
      border: 0;
      border-radius: 4px;
      padding: 8px 10px;
      font: inherit;
      text-decoration: none;
      cursor: pointer;
      pointer-events: auto;
    }

    button:hover,
    a:hover {
      background: #367448;
    }

    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    #status {
      padding: 7px 9px;
      border-radius: 4px;
      background: rgba(0, 0, 0, 0.58);
      color: #f4f4f4;
    }

    @media (max-width: 560px) {
      .bar {
        align-items: flex-end;
      }

      .actions a {
        display: none;
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="crop" aria-label="Ausschnitt Doettinger Hoehe mit Nebenstrasse">
      <img data-col="2" alt="Live-Ausschnitt Doettinger Hoehe linker Teil">
      <img data-col="3" alt="Live-Ausschnitt Doettinger Hoehe rechter Teil">
    </div>

    <div class="bar">
      <span id="status">Lade aktuellen Ausschnitt...</span>
      <div class="actions">
        <button type="button" id="refresh">Aktualisieren</button>
        <a href="https://panorama.nuerburgring.de/nordschleife-start" target="_blank" rel="noreferrer">Original oeffnen</a>
      </div>
    </div>
  </main>

  <script>
    const images = [...document.querySelectorAll(".crop img")];
    const status = document.getElementById("status");
    const refresh = document.getElementById("refresh");
    const api = "https://api.panomax.com/1.0/cams/2527/images/day";
    const camId = 2527;

    function buildTileUrl(day, time, storage, col) {
      const [year, month, date] = day.split("-");
      const fileTime = time.replaceAll(":", "-");
      return `https://panodata${storage}.panomax.com/cams/${camId}/${year}/${month}/${date}/${fileTime}_full_${col}_0.jpg`;
    }

    async function loadImage() {
      const now = new Date();
      status.textContent = "Lade aktuellen HD-Ausschnitt...";

      try {
        const response = await fetch(`${api}?t=${now.getTime()}`);
        if (!response.ok) {
          throw new Error(`HTTP ${response.status}`);
        }

        const day = await response.json();
        const latest = [...day.images].reverse().find((item) => item.available);

        if (!latest) {
          throw new Error("Kein aktuelles Bild gefunden");
        }

        for (const img of images) {
          const col = img.dataset.col;
          img.src = buildTileUrl(day.date, latest.time, day.storage, col);
        }

        status.textContent = `HD-Ausschnitt: ${latest.time} Uhr`;
      } catch (error) {
        status.textContent = "HD-Bild konnte nicht geladen werden.";
        console.error(error);
      }
    }

    images.forEach((image) => {
      image.addEventListener("error", () => {
        status.textContent = "Eine HD-Kachel konnte nicht geladen werden.";
      });
    });

    refresh.addEventListener("click", loadImage);
    loadImage();
    setInterval(loadImage, 60_000);
  </script>
</body>
</html>
